@if (dataState() === DataState.Error) {
  <div class="error">{{ errorMessage() }}</div>
} @else {
  <table class="findings-table">
    <tr>
      <th class="text-center">Risk</th>
      <th>Location</th>
      <th>Description</th>
      <th class="text-center">Status</th>
    </tr>
    @for (finding of findings(); track finding.id) {
      <tr sigridFindingNavigator [locations]="finding.fileLocations">
        <td class="text-center"><sigrid-severity-icon [severity]="finding.severity" /></td>
        <td><span [title]="finding.filePath"> {{ finding.displayFilePath }} </span></td>
        <td>
          <div class="action-button-container">
            <span>{{ finding.type }}</span>
            <sigrid-external-link [href]="finding.href" />
          </div>
        </td>
        <td class="status text-center">
          <div class="action-button-container">
            <span>{{FindingStatusEmoji[finding.status]}} {{ finding.statusLabel }}</span>
            <sigrid-icon-button iconClass="codicon codicon-edit"
                                ngxTooltip="Edit Finding"
                                [tooltipArrow]="false"
                                tooltipPosition="bottom"
                                (onClick)="onStatusClick(finding)"
            />
          </div>
        </td>
      </tr>
    }
  </table>
}
